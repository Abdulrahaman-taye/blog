<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#1a5632">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="description" content="Finance ISL - Your comprehensive resource for Islamic finance knowledge, business ethics, and Sharia-compliant economic principles.">
  <meta name="keywords" content="Islamic finance, Sharia compliant, Murabaha, Mudarabah, Sukuk, Takaful, Zakat, Islamic banking">
  <meta name="author" content="Finance ISL">
  
  <!-- Open Graph -->
  <meta property="og:title" content="Finance ISL - Islamic Finance Knowledge">
  <meta property="og:description" content="Your comprehensive resource for Islamic finance knowledge and business ethics.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://financeisl.com">
  
  <title>Finance ISL - Islamic Finance Knowledge</title>
  
  <!-- PWA Manifest -->
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/svg+xml" href="icons/favicon.svg">
  <link rel="apple-touch-icon" href="icons/icon-192.svg">
  
  <!-- Styles -->
  <link rel="stylesheet" href="css/styles.css">
  
  <!-- Splash Screen Style -->
  <style>
    #loading-screen {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: linear-gradient(135deg, #1a5632 0%, #0f3d22 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.3s ease;
    }
    
    .loading-logo {
      width: 120px;
      height: 120px;
      margin-bottom: 24px;
      animation: pulse 2s ease-in-out infinite;
    }
    
    .loading-text {
      color: white;
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 8px;
    }
    
    .loading-text span {
      color: #d4af37;
    }
    
    .loading-subtitle {
      color: rgba(255, 255, 255, 0.8);
      font-size: 1rem;
      margin-bottom: 32px;
    }
    
    .loading-spinner {
      width: 48px;
      height: 48px;
      border: 3px solid rgba(255, 255, 255, 0.2);
      border-top-color: #d4af37;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <a href="/admin.html">admin</a>
  <!-- Loading Screen -->
  <div id="loading-screen">
    <svg class="loading-logo" viewBox="0 0 192 192" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect width="192" height="192" rx="40" fill="#2d8a56"/>
      <path d="M56 48C56 48 96 28 112 48C128 68 112 88 112 88C112 88 128 108 112 128C96 148 56 128 56 128C56 128 40 108 56 88C72 68 56 48 56 48Z" fill="#d4af37"/>
      <circle cx="84" cy="78" r="10" fill="#1a5632"/>
      <text x="48" y="172" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="white">Finance ISL</text>
    </svg>
    <div class="loading-text">Finance <span>ISL</span></div>
    <div class="loading-subtitle">Islamic Finance Knowledge</div>
    <div class="loading-spinner"></div>
  </div>
  
  <!-- Offline Banner -->
  <div id="offline-banner" class="offline-banner">
    You are offline. Pull down to refresh when you're back online.
  </div>
  
  <!-- Pull to Refresh -->
  <div id="pull-to-refresh" class="pull-to-refresh">
    <div class="pull-to-refresh-spinner"></div>
    <span>Refreshing...</span>
  </div>
  
  <!-- Header -->
  <header class="header" id="header">
    <div class="header-inner">
      <div style="display: flex; align-items: center; gap: 12px;">
        <button class="menu-toggle" id="menu-toggle" aria-label="Open menu">
          <span></span>
          <span></span>
          <span></span>
        </button>
        <a href="#/" class="header-logo" onclick="App.navigateTo('/')">
          <span class="header-logo-text">Finance <span>ISL</span></span>
        </a>
      </div>
      
      <!-- Desktop Navigation -->
      <nav class="desktop-nav" id="desktop-nav">
        <!-- Rendered by JavaScript -->
      </nav>
      
      <div class="header-actions">
        <button class="header-btn" id="search-btn" aria-label="Search">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8"></circle>
            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
          </svg>
        </button>
        <button class="header-btn" id="theme-toggle" aria-label="Toggle theme">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="5"></circle>
            <line x1="12" y1="1" x2="12" y2="3"></line>
            <line x1="12" y1="21" x2="12" y2="23"></line>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
            <line x1="1" y1="12" x2="3" y2="12"></line>
            <line x1="21" y1="12" x2="23" y2="12"></line>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
          </svg>
        </button>
      </div>
    </div>
  </header>
  
  <!-- Sidebar Navigation -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <span style="font-weight: 700; font-size: 1.25rem;">Menu</span>
      <button class="sidebar-close" id="sidebar-close" aria-label="Close menu">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="18" y1="6" x2="6" y2="18"></line>
          <line x1="6" y1="6" x2="18" y2="18"></line>
        </svg>
      </button>
    </div>
    <nav class="nav-menu" id="nav-menu">
      <!-- Navigation will be rendered by JavaScript -->
    </nav>
  </aside>
  
  <!-- Sidebar Overlay -->
  <div class="sidebar-overlay" id="sidebar-overlay"></div>
  
  <!-- Search Modal -->
  <div class="search-modal" id="search-modal">
    <div class="search-header">
      <div class="search-input-wrapper">
        <div class="search-input-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8"></circle>
            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
          </svg>
        </div>
        <input type="text" class="search-input" id="search-input" placeholder="Search articles, topics...">
      </div>
      <button class="search-close" id="search-close" aria-label="Close search">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="18" y1="6" x2="6" y2="18"></line>
          <line x1="6" y1="6" x2="18" y2="18"></line>
        </svg>
      </button>
    </div>
    <div class="search-filters">
      <button class="search-filter active" onclick="App.handleSearch(document.getElementById('search-input').value)">All</button>
      <button class="search-filter" onclick="App.handleSearch(document.getElementById('search-input').value)">Islamic Finance</button>
      <button class="search-filter" onclick="App.handleSearch(document.getElementById('search-input').value)">Business</button>
      <button class="search-filter" onclick="App.handleSearch(document.getElementById('search-input').value)">Ethics</button>
    </div>
    <div class="search-results" id="search-results">
      <div class="search-empty">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="64" height="64">
          <circle cx="11" cy="11" r="8"></circle>
          <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
        </svg>
        <h3>Start typing to search</h3>
        <p>Search through our articles, topics, and resources.</p>
      </div>
    </div>
  </div>
  
  <!-- Main Content -->
  <main class="main-content" id="main-content">
    <!-- Content will be rendered by JavaScript -->
  </main>
  
  <!-- Footer -->
  <footer class="footer" id="footer">
    <!-- Footer will be rendered by JavaScript -->
  </footer>
  
  <!-- Contact FAB -->
  <button class="fab-contact" id="fab-contact" aria-label="Contact us">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
    </svg>
  </button>
  
  <!-- Contact Modal -->
  <div class="contact-modal" id="contact-modal">
    <div class="contact-modal-header">
      <span class="contact-modal-title">Contact Us</span>
      <button class="contact-modal-close" id="contact-close" aria-label="Close">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="18" y1="6" x2="6" y2="18"></line>
          <line x1="6" y1="6" x2="18" y2="18"></line>
        </svg>
      </button>
    </div>
    <form class="contact-form" id="contact-form">
      <div class="form-group">
        <label class="form-label" for="contact-name">Your Name</label>
        <input type="text" class="form-input" id="contact-name" name="name" placeholder="Enter your full name" required>
      </div>
      <div class="form-group">
        <label class="form-label" for="contact-email">Email Address</label>
        <input type="email" class="form-input" id="contact-email" name="email" placeholder="your@email.com" required>
      </div>
      <div class="form-group">
        <label class="form-label" for="contact-message">Message</label>
        <textarea class="form-textarea" id="contact-message" name="message" placeholder="Your message..." required></textarea>
      </div>
      <button type="submit" class="form-submit">Send Message</button>
      <p style="font-size: 0.75rem; color: var(--text-muted); margin-top: 12px; text-align: center;">
        Your email client will open with the message ready to send.
      </p>
    </form>
  </div>
  
  <!-- Back to Top Button -->
  <button class="back-to-top" id="back-to-top" aria-label="Back to top">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <line x1="12" y1="19" x2="12" y2="5"></line>
      <polyline points="5 12 12 5 19 12"></polyline>
    </svg>
  </button>
  
  <!-- Toast Notification -->
  <div class="toast" id="toast"></div>
  
  <!-- Scripts -->
  <script src="env.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/theme.js"></script>
  <script src="js/supabase.js"></script>
  <script src="js/content.js"></script>
  <script src="js/router.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
