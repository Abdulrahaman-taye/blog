<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline - Finance ISL</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    
    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: linear-gradient(135deg, #1a5632 0%, #0f3d22 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      padding: 20px;
    }
    
    .container {
      text-align: center;
      max-width: 500px;
    }
    
    .icon {
      width: 120px;
      height: 120px;
      margin: 0 auto 32px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .icon svg {
      width: 64px;
      height: 64px;
      stroke: #d4af37;
      fill: none;
      stroke-width: 2;
    }
    
    h1 {
      font-size: 2rem;
      margin-bottom: 16px;
    }
    
    p {
      font-size: 1.1rem;
      opacity: 0.9;
      line-height: 1.6;
      margin-bottom: 32px;
    }
    
    .btn {
      display: inline-block;
      padding: 16px 32px;
      background: #d4af37;
      color: #1a5632;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      text-decoration: none;
    }
    
    .btn:hover {
      background: #b8941f;
      transform: translateY(-2px);
    }
    
    .features {
      margin-top: 48px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 16px;
    }
    
    .feature {
      padding: 16px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 8px;
    }
    
    .feature-icon {
      font-size: 2rem;
      margin-bottom: 8px;
    }
    
    .feature-text {
      font-size: 0.875rem;
      opacity: 0.9;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">
      <svg viewBox="0 0 24 24">
        <line x1="1" y1="1" x2="23" y2="23"></line>
        <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"></path>
        <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"></path>
        <path d="M10.71 5.05A16 16 0 0 1 22.56 9"></path>
        <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"></path>
        <path d="M8.53 16.11a6 6 0 0 1 6.95 0"></path>
        <line x1="12" y1="20" x2="12.01" y2="20"></line>
      </svg>
    </div>
    
    <h1>You're Offline</h1>
    <p>
      It looks like you've lost your internet connection. 
      Don't worry, you can still browse previously loaded content.
    </p>
    
    <a href="/" class="btn">Try Again</a>
    
    <div class="features">
      <div class="feature">
        <div class="feature-icon">📚</div>
        <div class="feature-text">Cached articles available</div>
      </div>
      <div class="feature">
        <div class="feature-icon">📖</div>
        <div class="feature-text">Glossary accessible</div>
      </div>
      <div class="feature">
        <div class="feature-icon">❓</div>
        <div class="feature-text">FAQs viewable</div>
      </div>
    </div>
  </div>
</body>
</html>
